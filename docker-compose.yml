services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hema}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-hema}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hema} -d ${POSTGRES_DB:-hema}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Одноразовый прогон goose-миграций всех модулей перед стартом сервера.
  # Goose хранит версию НА МОДУЛЬ (отдельная таблица), чтобы одинаково
  # названные 00001_init.sql в разных модулях не silent-skip'али друг друга.
  # Цикл по /app/modules/*/migrations соответствует `make migrate`.
  migrate:
    build:
      context: ./server
    entrypoint:
      - "/bin/sh"
      - "-c"
      - |
        for d in /app/modules/*/migrations; do
          m=$$(basename "$$(dirname "$$d")")
          /app/goose -dir "$$d" -table "goose_db_version_$$m" postgres "$$DATABASE_URL" up
        done
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-hema}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-hema}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  server:
    build:
      context: ./server
    environment:
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: "8080"
      DATABASE_URL: postgres://${POSTGRES_USER:-hema}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-hema}?sslmode=disable
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-access-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh-secret}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-720h}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
      BOOTSTRAP_ADMIN_DISPLAY_NAME: ${BOOTSTRAP_ADMIN_DISPLAY_NAME:-Admin}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  web:
    build:
      context: ./web
    environment:
      SERVER_GRPC_URL: http://server:8080
      PORT: "3000"
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - server

volumes:
  pgdata:
