version: "2"
sql:
  - name: auth
    engine: postgresql
    schema: modules/auth/migrations
    queries: modules/auth/repo/queries
    gen:
      go:
        package: sqlc
        out: modules/auth/repo/sqlc
        sql_package: pgx/v5
        emit_json_tags: false
        emit_pointers_for_null_types: true
        overrides:
          - db_type: uuid
            go_type:
              import: github.com/google/uuid
              type: UUID
          - db_type: timestamptz
            go_type: time.Time
