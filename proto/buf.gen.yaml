version: v2
clean: true
plugins:
  # ── Go (connect-go) ──────────────────────────────────────────
  # Пути `out` относительны к CWD запуска buf (директория server/, см. Makefile).
  - remote: buf.build/protocolbuffers/go
    out: gen
    opt:
      - paths=source_relative
  - remote: buf.build/connectrpc/go
    out: gen
    opt:
      - paths=source_relative

  # ── TypeScript (connect-es) ──────────────────────────────────
  - remote: buf.build/bufbuild/es
    out: ../web/src/gen
    opt:
      - target=ts
